<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles/game.css" />
  <title>Draw.it | Game</title>
</head>

<body>
  <div id="header">
    <h1>Draw.IT</h1>
  </div>
  <div id="box-game">
    <div id="content-box">
      <div id="box-canvas">
        <div id="controls">
          <div id="type">
            <input type="radio" name="pen-type" id="pen-pencil" checked>
            <label for="pen-pencil">
              <i class="fa fa-pencil"></i>
            </label>
            <input type="radio" name="pen-type" id="pen-brush">
            <label for="pen-brush">
              <i class="fa fa-paint-brush"></i>
            </label>
          </div>
          <div id="size">
            <label for="pen-size">Size</label>
            <input type="range" id="pen-size" min="1" max="50">
          </div>
          <div id="color">
            <label for="pen-color">Color</label>
            <input type="color" id="pen-color" value="#000000">
          </div>
          <div id="actions">
            <button id="reset-canvas">Reset</button>
          </div>
        </div>
        <div id="canvas-wrapper"></div>
      </div>
      <div id="footer">
        <label for="wordIpt">Advinhe:</label>
        <input type="text" name="word" id="wordIpt" />
        <button id="sendBtn">Enviar</button>
        <span id="timer">2:00</span>
        <img src="../img/game/clock.svg" id="img-clock" data-animate="clock" />
      </div>
    </div>
  </div>
  <audio src="../song/despertador.mp3" id="clockAudio" preload="auto"></audio>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../js/game.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.6/p5.min.js"></script>
</body>

</html>
